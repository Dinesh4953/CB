{% extends 'academics/base.html' %}

{% block body %}

<style>

  body, html {

    margin: 0;
    padding: 0;

    background: #0b0f19;

    color: white;

    font-family: 'Segoe UI', sans-serif;

}

  .chat-wrapper {
    display: flex;
    flex-direction: column;
    height: calc(100vh - 56px);
    background:
      radial-gradient(circle at top left, #132238, transparent 30%),
      radial-gradient(circle at top right, #1a1140, transparent 30%),
      #0b0f19;
  }

  .top-bar {
    padding: 1rem 1.5rem;
    border-bottom: 1px solid #1f2937;
    background: rgba(15, 23, 42, 0.8);
    backdrop-filter: blur(10px);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .logo-title {
    font-size: 1.4rem;
    font-weight: bold;
    color: #60a5fa;
  }

  .logo-title span {
    color: #22d3ee;
  }

  .chat-box {
    flex: 1;
    overflow-y: auto;
    padding: 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 1rem;
    scroll-behavior: smooth;
  }

  .chat-message {
    max-width: 85%;
    padding: 1rem 1.2rem;
    border-radius: 18px;
    line-height: 1.6;
    animation: fadeIn 0.2s ease;
    word-wrap: break-word;
  }

  @keyframes fadeIn {
    from {
      opacity: 0;
      transform: translateY(10px);
    }
    to {
      opacity: 1;
      transform: translateY(0px);
    }
  }

  .user-message {
    align-self: flex-end;
    background: linear-gradient(135deg, #2563eb, #1d4ed8);
    color: white;
    border-bottom-right-radius: 5px;
  }

  .ai-message {
    align-self: flex-start;
    background: #111827;
    border: 1px solid #1f2937;
    border-bottom-left-radius: 5px;
  }

  .welcome-box {
    margin: auto;
    text-align: center;
  }

  .welcome-box h1 {
    font-size: 3rem;
    font-weight: bold;
    margin-bottom: 0.5rem;
    background: linear-gradient(to right, #38bdf8, #818cf8);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .welcome-box p {
    color: #94a3b8;
    font-size: 1.1rem;
  }

  .input-container {
    padding: 1rem;
    border-top: 1px solid #1f2937;
    background: rgba(15, 23, 42, 0.9);
    backdrop-filter: blur(10px);
  }

  .input-bar {
    display: flex;
    align-items: center;
    gap: 0.8rem;
    background: #111827;
    border: 1px solid #1f2937;
    border-radius: 18px;
    padding: 0.8rem;
  }

  .input-bar textarea {
    flex: 1;
    background: transparent;
    border: none;
    color: white;
    resize: none;
    outline: none;
    font-size: 1rem;
    max-height: 180px;
  }

  .send-btn {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    border: none;
    background: linear-gradient(135deg, #3b82f6, #06b6d4);
    color: white;
    font-size: 1.2rem;
    cursor: pointer;
    transition: 0.2s;
  }

  .send-btn:hover {
    transform: scale(1.05);
  }

  .upload-btn {
    cursor: pointer;
    background: #1e293b;
    color: #cbd5e1;
    padding: 0.6rem 1rem;
    border-radius: 12px;
    transition: 0.2s;
    border: 1px solid #334155;
    font-size: 0.95rem;
  }

  .upload-btn:hover {
    background: #334155;
  }

  #pdf-upload {
    display: none;
  }

  .typing {
    display: inline-flex;
    gap: 4px;
    align-items: center;
  }

  .typing span {
    width: 8px;
    height: 8px;
    background: #60a5fa;
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }

  .typing span:nth-child(2) {
    animation-delay: 0.2s;
  }

  .typing span:nth-child(3) {
    animation-delay: 0.4s;
  }

  @keyframes bounce {
    0%, 80%, 100% {
      transform: scale(0.7);
      opacity: 0.5;
    }
    40% {
      transform: scale(1);
      opacity: 1;
    }
  }

  /* CODE BLOCKS */

  .code-container {
    position: relative;
    margin-top: 1rem;
  }

  .copy-btn {
    position: absolute;
    top: 10px;
    right: 10px;
    background: #1e293b;
    color: white;
    border: none;
    padding: 0.4rem 0.7rem;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.8rem;
    z-index: 10;
  }

  .copy-btn:hover {
    background: #334155;
  }

  pre[class*="language-"] {
    border-radius: 14px;
    padding: 1.2rem !important;
    margin-top: 0.5rem !important;
    overflow-x: auto;
    background: #0f172a !important;
    border: 1px solid #1e293b;
  }

  code[class*="language-"] {
    font-size: 0.92rem;
    font-family: Consolas, monospace;
  }

</style>


<div class="chat-wrapper">

  <div class="top-bar">
    <div class="logo-title">
      AI<span>-Tutor</span>
    </div>

    <label for="pdf-upload" class="upload-btn">
      📄 Upload PDF
    </label>

    <input type="file" id="pdf-upload" accept=".pdf">
  </div>


  <div class="chat-box" id="chat-box">

    <div class="welcome-box" id="welcome-text">
      <h1>AI-Tutor</h1>

      <p>
        Chat with AI, upload PDFs, use memory & web search 🚀
      </p>
    </div>

  </div>


  <div class="input-container">

    <form method="post" class="input-bar" id="chat-form">

      {% csrf_token %}

      <textarea
        name="prompt"
        id="prompt-input"
        rows="1"
        placeholder="Ask anything..."
        required></textarea>

      <button type="submit" class="send-btn">
        ➤
      </button>

    </form>

  </div>

</div>


<!-- JQUERY -->

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>


<!-- PRISM -->

<link
rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism-tomorrow.min.css"
/>

<script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/prism.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-python.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-java.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-javascript.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-c.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-cpp.min.js"></script>


<script>

const chatBox = $('#chat-box');


function escapeHtml(text) {

  return text
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");
}


function scrollBottom() {
  chatBox.scrollTop(chatBox[0].scrollHeight);
}


function appendMessage(text, type) {

  $('#welcome-text').remove();

  const message = $('<div></div>')
    .addClass('chat-message')
    .addClass(
      type === 'user'
      ? 'user-message'
      : 'ai-message'
    );

  chatBox.append(message);

  if (type === 'ai') {

    let formatted = "";
    let lastIndex = 0;

    const regex = /```(\w+)?\n([\s\S]*?)```/g;

    let match;

    while ((match = regex.exec(text)) !== null) {

      formatted += escapeHtml(
        text.slice(lastIndex, match.index)
      ).replace(/\n/g, "<br>");

      const lang = match[1] || "python";

      const code = escapeHtml(match[2]);

      const uniqueId =
        "code-" + Math.random().toString(36).substring(2, 9);

      formatted += `
      <div class="code-container">

        <button
          class="copy-btn"
          onclick="copyCode('${uniqueId}')">

          Copy

        </button>

        <pre class="language-${lang}">
<code id="${uniqueId}" class="language-${lang}">
${code}
</code>
        </pre>

      </div>
      `;

      lastIndex = regex.lastIndex;
    }

    formatted += escapeHtml(
      text.slice(lastIndex)
    ).replace(/\n/g, "<br>");

    message.html(formatted);

    Prism.highlightAll();

  }

  else {

    message.text(text);

  }

  scrollBottom();
}



function copyCode(id) {

  const text =
    document.getElementById(id).innerText;

  navigator.clipboard.writeText(text);

  alert("Code copied!");
}



function showTyping() {

  const typing = $(`
    <div class="chat-message ai-message" id="typing-box">

      <div class="typing">
        <span></span>
        <span></span>
        <span></span>
      </div>

    </div>
  `);

  chatBox.append(typing);

  scrollBottom();
}


function removeTyping() {
  $('#typing-box').remove();
}



$('#chat-form').on('submit', function(e) {

  e.preventDefault();

  const prompt =
    $('#prompt-input').val().trim();

  if (!prompt) return;

  appendMessage(prompt, 'user');

  $('#prompt-input').val('');

  showTyping();

  $.ajax({

    type: 'POST',

    url: '{% url "ask_gemini" %}',

    data: {

      prompt: prompt,

      csrfmiddlewaretoken:
      $('input[name=csrfmiddlewaretoken]').val()

    },

    success: function(data) {

      removeTyping();

      appendMessage(data.response, 'ai');
    },

    error: function() {

      removeTyping();

      appendMessage(
        "⚠️ Something went wrong.",
        'ai'
      );
    }
  });

});



$('#pdf-upload').on('change', function() {

  const file = this.files[0];

  if (!file) return;

  const formData = new FormData();

  formData.append('pdf', file);

  formData.append(
    'csrfmiddlewaretoken',
    $('input[name=csrfmiddlewaretoken]').val()
  );

  appendMessage(
    `📄 Uploaded: ${file.name}`,
    'user'
  );

  showTyping();

  $.ajax({

    url: '{% url "ask_gemini" %}',

    type: 'POST',

    data: formData,

    processData: false,

    contentType: false,

    success: function(data) {

      removeTyping();

      appendMessage(data.response, 'ai');
    },

    error: function() {

      removeTyping();

      appendMessage(
        "⚠️ PDF upload failed.",
        'ai'
      );
    }

  });

});

</script>

{% endblock %}
