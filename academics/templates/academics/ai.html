{% extends 'academics/base.html' %}

{% block body %}

<style>

  body, html {
    margin: 0;
    padding: 0;
    background: var(--theme-bg-primary);
    color: var(--theme-text-primary);
    font-family: inherit;
  }

  .chat-wrapper {
    display: flex;
    flex-direction: column;
    height: calc(100vh - 75px);
    background: var(--theme-bg-primary);
  }

  .top-bar {
    padding: 1rem 1.5rem;
    border-bottom: 1px solid var(--theme-border);
    background: var(--theme-navbar);
    backdrop-filter: blur(10px);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .logo-title {
    font-size: 1.4rem;
    font-weight: 800;
    color: var(--theme-primary);
  }

  .logo-title span {
    color: var(--theme-secondary);
  }

  .chat-box {
    flex: 1;
    overflow-y: auto;
    padding: 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 1rem;
    scroll-behavior: smooth;
  }

  .chat-message {
    max-width: 85%;
    padding: 1rem 1.2rem;
    border-radius: 18px;
    line-height: 1.6;
    animation: fadeIn 0.2s ease;
    word-wrap: break-word;
  }

  @keyframes fadeIn {
    from {
      opacity: 0;
      transform: translateY(10px);
    }
    to {
      opacity: 1;
      transform: translateY(0px);
    }
  }

  .user-message {
    align-self: flex-end;
    background: var(--gradient-border);
    color: #ffffff !important;
    border-bottom-right-radius: 5px;
  }
  
  [data-theme="dark"] .user-message {
    color: #000000 !important;
  }

  .ai-message {
    align-self: flex-start;
    background: var(--theme-card-bg);
    border: 1px solid var(--theme-border);
    color: var(--theme-text-primary);
    border-bottom-left-radius: 5px;
  }

  .welcome-box {
    margin: auto;
    text-align: center;
    max-width: 500px;
    padding: 2rem;
  }

  .welcome-box h1 {
    font-size: 3rem;
    font-weight: 800;
    margin-bottom: 0.5rem;
    background: var(--gradient-border);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .welcome-box p {
    color: var(--theme-text-secondary);
    font-size: 1.1rem;
  }

  .input-container {
    padding: 1rem;
    border-top: 1px solid var(--theme-border);
    background: var(--theme-bg-secondary);
  }

  .input-bar {
    display: flex;
    align-items: center;
    gap: 0.8rem;
    background: var(--theme-input-bg);
    border: 1px solid var(--theme-input-border);
    border-radius: 18px;
    padding: 0.8rem;
  }

  .input-bar textarea {
    flex: 1;
    background: transparent !important;
    border: none !important;
    color: var(--theme-text-primary) !important;
    resize: none;
    outline: none !important;
    font-size: 1rem;
    max-height: 180px;
    box-shadow: none !important;
    padding: 0 !important;
  }

  .send-btn {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    border: none;
    background: var(--gradient-border);
    color: #ffffff !important;
    font-size: 1.2rem;
    cursor: pointer;
    transition: 0.2s;
  }
  
  [data-theme="dark"] .send-btn {
    color: #000000 !important;
  }

  .send-btn:hover {
    transform: scale(1.05);
  }

  .upload-btn {
    cursor: pointer;
    background: var(--theme-bg-tertiary);
    color: var(--theme-text-primary);
    padding: 0.6rem 1rem;
    border-radius: 12px;
    transition: 0.2s;
    border: 1px solid var(--theme-border);
    font-size: 0.95rem;
    font-weight: 600;
  }

  .upload-btn:hover {
    background: var(--theme-bg-secondary);
    border-color: var(--theme-primary);
    color: var(--theme-primary);
  }

  #pdf-upload {
    display: none;
  }

  .typing {
    display: inline-flex;
    gap: 4px;
    align-items: center;
  }

  .typing span {
    width: 8px;
    height: 8px;
    background: var(--theme-primary);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }

  .typing span:nth-child(2) {
    animation-delay: 0.2s;
  }

  .typing span:nth-child(3) {
    animation-delay: 0.4s;
  }

  @keyframes bounce {
    0%, 80%, 100% {
      transform: scale(0.7);
      opacity: 0.5;
    }
    40% {
      transform: scale(1);
      opacity: 1;
    }
  }

  /* CODE BLOCKS */

  .code-container {
    position: relative;
    margin-top: 1rem;
  }

  .copy-btn {
    position: absolute;
    top: 10px;
    right: 10px;
    background: var(--theme-primary);
    color: #ffffff !important;
    border: none;
    padding: 0.4rem 0.7rem;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.8rem;
    font-weight: 700;
    z-index: 10;
  }
  
  [data-theme="dark"] .copy-btn {
    color: #000000 !important;
  }

  .copy-btn:hover {
    filter: brightness(1.1);
  }

  pre[class*="language-"] {
    border-radius: 14px;
    padding: 1.2rem !important;
    margin-top: 0.5rem !important;
    overflow-x: auto;
    background: var(--theme-bg-secondary) !important;
    border: 1px solid var(--theme-border) !important;
  }

  code[class*="language-"] {
    font-size: 0.92rem;
    font-family: Consolas, monospace;
    color: var(--theme-text-primary) !important;
  }

</style>


<div class="chat-wrapper">

  <div class="top-bar">
    <div class="logo-title">
      AI<span>-Tutor</span>
    </div>

    <label for="pdf-upload" class="upload-btn">
      📄 Upload PDF
    </label>

    <input type="file" id="pdf-upload" accept=".pdf">
  </div>


  <div class="chat-box" id="chat-box">

    <div class="welcome-box" id="welcome-text">
      <h1>AI-Tutor</h1>

      <p>
        Chat with AI, upload PDFs, use memory & web search 🚀
      </p>
    </div>

  </div>


  <div class="input-container">

    <form method="post" class="input-bar" id="chat-form">

      {% csrf_token %}

      <textarea
        name="prompt"
        id="prompt-input"
        rows="1"
        placeholder="Ask anything..."
        required></textarea>

      <button type="submit" class="send-btn">
        ➤
      </button>

    </form>

  </div>

</div>


<!-- JQUERY -->

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>


<!-- PRISM -->

<link
rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism-tomorrow.min.css"
/>

<script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/prism.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-python.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-java.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-javascript.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-c.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-cpp.min.js"></script>


<script>

const chatBox = $('#chat-box');


function escapeHtml(text) {

  return text
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");
}


function scrollBottom() {
  chatBox.scrollTop(chatBox[0].scrollHeight);
}


function appendMessage(text, type) {

  $('#welcome-text').remove();

  const message = $('<div></div>')
    .addClass('chat-message')
    .addClass(
      type === 'user'
      ? 'user-message'
      : 'ai-message'
    );

  chatBox.append(message);

  if (type === 'ai') {

    let formatted = "";
    let lastIndex = 0;

    const regex = /```(\w+)?\n([\s\S]*?)```/g;

    let match;

    while ((match = regex.exec(text)) !== null) {

      formatted += escapeHtml(
        text.slice(lastIndex, match.index)
      ).replace(/\n/g, "<br>");

      const lang = match[1] || "python";

      const code = escapeHtml(match[2]);

      const uniqueId =
        "code-" + Math.random().toString(36).substring(2, 9);

      formatted += `
      <div class="code-container">

        <button
          class="copy-btn"
          onclick="copyCode('${uniqueId}')">

          Copy

        </button>

        <pre class="language-${lang}">
<code id="${uniqueId}" class="language-${lang}">
${code}
</code>
        </pre>

      </div>
      `;

      lastIndex = regex.lastIndex;
    }

    formatted += escapeHtml(
      text.slice(lastIndex)
    ).replace(/\n/g, "<br>");

    message.html(formatted);

    Prism.highlightAll();

  }

  else {

    message.text(text);

  }

  scrollBottom();
}



function copyCode(id) {

  const text =
    document.getElementById(id).innerText;

  navigator.clipboard.writeText(text);

  alert("Code copied!");
}


function updateAiMessage(messageElement, text) {
  let formatted = "";
  let lastIndex = 0;

  const regex = /```(\w+)?\n([\s\S]*?)```/g;
  let match;

  while ((match = regex.exec(text)) !== null) {
    formatted += escapeHtml(
      text.slice(lastIndex, match.index)
    ).replace(/\n/g, "<br>");

    const lang = match[1] || "python";
    const code = escapeHtml(match[2]);
    const uniqueId = "code-" + Math.random().toString(36).substring(2, 9);

    formatted += `
    <div class="code-container">
      <button class="copy-btn" onclick="copyCode('${uniqueId}')">Copy</button>
      <pre class="language-${lang}"><code id="${uniqueId}" class="language-${lang}">${code}</code></pre>
    </div>
    `;

    lastIndex = regex.lastIndex;
  }

  // Check if there is an unclosed code block at the end (for active streaming)
  const openCodeBlockIndex = text.indexOf("```", lastIndex);
  if (openCodeBlockIndex !== -1 && openCodeBlockIndex === text.lastIndexOf("```")) {
    formatted += escapeHtml(
      text.slice(lastIndex, openCodeBlockIndex)
    ).replace(/\n/g, "<br>");

    const blockContent = text.slice(openCodeBlockIndex + 3);
    const firstNewLine = blockContent.indexOf("\n");
    let lang = "python";
    let code = blockContent;

    if (firstNewLine !== -1) {
      lang = blockContent.slice(0, firstNewLine).trim() || "python";
      code = blockContent.slice(firstNewLine + 1);
    }

    const uniqueId = "code-" + Math.random().toString(36).substring(2, 9);
    formatted += `
    <div class="code-container">
      <button class="copy-btn" onclick="copyCode('${uniqueId}')">Copy</button>
      <pre class="language-${lang}"><code id="${uniqueId}" class="language-${lang}">${escapeHtml(code)}</code></pre>
    </div>
    `;
  } else {
    formatted += escapeHtml(
      text.slice(lastIndex)
    ).replace(/\n/g, "<br>");
  }

  messageElement.html(formatted);
  Prism.highlightAllUnder(messageElement[0]);
  scrollBottom();
}


function showTyping() {

  const typing = $(`
    <div class="chat-message ai-message" id="typing-box">

      <div class="typing">
        <span></span>
        <span></span>
        <span></span>
      </div>

    </div>
  `);

  chatBox.append(typing);

  scrollBottom();
}


function removeTyping() {
  $('#typing-box').remove();
}


$('#chat-form').on('submit', async function(e) {

  e.preventDefault();

  const prompt =
    $('#prompt-input').val().trim();

  if (!prompt) return;

  appendMessage(prompt, 'user');

  $('#prompt-input').val('');

  showTyping();

  try {
    const response = await fetch('{% url "ask_gemini" %}', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/x-www-form-urlencoded',
        'X-CSRFToken': $('input[name=csrfmiddlewaretoken]').val()
      },
      body: new URLSearchParams({
        'prompt': prompt
      })
    });

    removeTyping();

    if (!response.ok) {
      throw new Error("HTTP error " + response.status);
    }

    // Append a new empty AI message box for the incoming stream
    $('#welcome-text').remove();
    const messageElement = $('<div></div>')
      .addClass('chat-message')
      .addClass('ai-message');
    chatBox.append(messageElement);
    scrollBottom();

    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let accumulatedText = "";

    while (true) {
      const { value, done } = await reader.read();
      if (done) break;
      accumulatedText += decoder.decode(value, { stream: true });
      updateAiMessage(messageElement, accumulatedText);
    }

  } catch (error) {
    removeTyping();
    console.error("Chat error:", error);
    appendMessage("⚠️ Something went wrong: " + error.message, 'ai');
  }

});



$('#pdf-upload').on('change', function() {

  const file = this.files[0];

  if (!file) return;

  const formData = new FormData();

  formData.append('pdf', file);

  formData.append(
    'csrfmiddlewaretoken',
    $('input[name=csrfmiddlewaretoken]').val()
  );

  appendMessage(
    `📄 Uploaded: ${file.name}`,
    'user'
  );

  showTyping();

  $.ajax({

    url: '{% url "ask_gemini" %}',

    type: 'POST',

    data: formData,

    processData: false,

    contentType: false,

    success: function(data) {

      removeTyping();

      appendMessage(data.response, 'ai');
    },

    error: function() {

      removeTyping();

      appendMessage(
        "⚠️ PDF upload failed.",
        'ai'
      );
    }

  });

});

</script>

{% endblock %}
