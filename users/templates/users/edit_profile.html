{% extends 'academics/base.html' %}
{% block body %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6 col-lg-5">
        <div class="card gradient-border p-4 p-md-5">
            <h2 class="text-center mb-4">⚙️ Edit Profile</h2>
            <p class="text-secondary text-center mb-4">Update your biography and competitive coding handle</p>
            
            <form method="POST">
                {% csrf_token %}
                
                {% for field in form %}
                    <div class="mb-3">
                        <label class="form-label fw-bold">{{ field.label }}</label>
                        {{ field }}
                        {% if field.errors %}
                            <div class="text-danger small mt-1">
                                {{ field.errors }}
                            </div>
                        {% endif %}
                    </div>
                {% endfor %}
                
                <div class="d-flex gap-3 mt-4">
                    <a href="{% url 'profile' %}" class="btn btn-outline-secondary flex-fill">Cancel</a>
                    <button type="submit" class="btn btn-primary flex-fill">Save Changes</button>
                </div>
            </form>
        </div>
    </div>
</div>

{% endblock %}
